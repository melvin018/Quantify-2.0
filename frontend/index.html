<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantify — Financial Q&A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0E11;
    --bg-raised: #12161B;
    --line: #1F262E;
    --text: #E8E6E0;
    --text-dim: #7C8690;
    --signal: #3DDC84;
    --amber: #D89B3C;
    --red: #E2574C;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Ticker strip (signature element) ---------- */
  .ticker-wrap {
    border-bottom: 1px solid var(--line);
    background: var(--bg-raised);
    overflow: hidden;
    white-space: nowrap;
    position: relative;
  }

  .ticker {
    display: inline-flex;
    gap: 2.5rem;
    padding: 0.6rem 1.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    animation: scroll-ticker 28s linear infinite;
  }

  .ticker-wrap:hover .ticker { animation-play-state: paused; }

  @keyframes scroll-ticker {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .tick { color: var(--text-dim); }
  .tick .sym { color: var(--text); font-weight: 600; }
  .tick .up { color: var(--signal); }
  .tick .down { color: var(--red); }

  /* ---------- Header ---------- */
  header {
    padding: 2.5rem 1.5rem 1.25rem;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
  }

  .brand-mark {
    font-family: var(--mono);
    font-size: 1.05rem;
    color: var(--signal);
    letter-spacing: 0.02em;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.92rem;
    margin-top: 0.4rem;
    line-height: 1.5;
  }

  .subtitle code {
    font-family: var(--mono);
    font-size: 0.85em;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    color: var(--amber);
  }

  /* ---------- Chat area ---------- */
  main {
    flex: 1;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 0 1.5rem 1.5rem;
    display: flex;
    flex-direction: column;
  }

  .log {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
    padding-bottom: 1.5rem;
  }

  .empty-state {
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 1.75rem;
    color: var(--text-dim);
    font-size: 0.88rem;
    line-height: 1.6;
  }

  .empty-state .examples {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-top: 0.9rem;
  }

  .example-btn {
    text-align: left;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 0.55rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .example-btn:hover {
    border-color: var(--signal);
    color: var(--signal);
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    max-width: 88%;
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; }

  .bubble {
    padding: 0.7rem 0.95rem;
    border-radius: 10px;
    font-size: 0.94rem;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  .msg.user .bubble {
    background: var(--signal);
    color: #04140C;
    border-radius: 10px 10px 2px 10px;
  }

  .msg.bot .bubble {
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 10px 10px 10px 2px;
  }

  .meta-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .tag {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0.12rem 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .tag.live { color: var(--signal); border-color: var(--signal); }
  .tag.mock { color: var(--amber); border-color: var(--amber); }

  .thinking {
    display: inline-flex;
    gap: 0.3rem;
    align-items: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: pulse-dot 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes pulse-dot {
    0%, 80%, 100% { opacity: 0.25; }
    40% { opacity: 1; }
  }

  /* ---------- Input bar ---------- */
  .input-bar {
    display: flex;
    gap: 0.6rem;
    border-top: 1px solid var(--line);
    padding-top: 1rem;
  }

  .input-bar input {
    flex: 1;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .input-bar input:focus {
    border-color: var(--signal);
  }

  .input-bar input::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--signal);
    color: #04140C;
    border: none;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.85rem;
    padding: 0 1.3rem;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn:focus-visible,
  .example-btn:focus-visible,
  .input-bar input:focus-visible {
    outline: 2px solid var(--signal);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .ticker, .dot { animation: none; }
  }

  @media (max-width: 480px) {
    header { padding: 1.5rem 1rem 1rem; }
    main { padding: 0 1rem 1rem; }
    .msg { max-width: 95%; }
  }
</style>
</head>
<body>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker"></div>
  </div>

  <header>
    <div class="brand">
      <span class="brand-mark">&gt;_</span>
      <h1>Quantify</h1>
    </div>
    <p class="subtitle">
      Ask plain-language questions about stocks and get answers grounded in
      real financial data. Running on <code>mock_data</code> until an Alpha
      Vantage key is set — see the tag on each answer below.
    </p>
  </header>

  <main>
    <div class="log" id="log">
      <div class="empty-state" id="emptyState">
        Try asking about a price, a comparison, or a fundamental like P/E or dividend yield.
        <div class="examples">
          <button class="example-btn" data-q="What is the price of AAPL?">What is the price of AAPL?</button>
          <button class="example-btn" data-q="Compare AMD and NVDA fundamentals">Compare AMD and NVDA fundamentals</button>
          <button class="example-btn" data-q="What is the dividend yield for MSFT?">What is the dividend yield for MSFT?</button>
        </div>
      </div>
    </div>

    <form class="input-bar" id="chatForm">
      <input
        type="text"
        id="questionInput"
        placeholder="Ask about a stock, e.g. &quot;How is TSLA doing today?&quot;"
        autocomplete="off"
      />
      <button class="send-btn" type="submit" id="sendBtn">Ask</button>
    </form>
  </main>

<script>
  const API_BASE = window.QUANTIFY_API_BASE || 'http://localhost:8000';

  // ---------- Ticker strip ----------
  const TICKER_SYMBOLS = ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'TSLA', 'AMD', 'NVDA'];

  function renderTicker() {
    const el = document.getElementById('ticker');
    const items = TICKER_SYMBOLS.map(sym => {
      const change = (Math.random() * 6 - 3);
      const cls = change >= 0 ? 'up' : 'down';
      const arrow = change >= 0 ? '▲' : '▼';
      return `<span class="tick"><span class="sym">${sym}</span> <span class="${cls}">${arrow} ${Math.abs(change).toFixed(2)}%</span></span>`;
    }).join('');
    // duplicate for seamless scroll loop
    el.innerHTML = items + items;
  }
  renderTicker();

  // ---------- Chat ----------
  const log = document.getElementById('log');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('questionInput');
  const sendBtn = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');

  function scrollToBottom() {
    log.scrollTop = log.scrollHeight;
  }

  function addUserMessage(text) {
    if (emptyState) emptyState.remove();
    const msg = document.createElement('div');
    msg.className = 'msg user';
    msg.innerHTML = `<div class="bubble"></div>`;
    msg.querySelector('.bubble').textContent = text;
    log.appendChild(msg);
    scrollToBottom();
  }

  function addThinking() {
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.id = 'thinkingMsg';
    msg.innerHTML = `<div class="bubble thinking">Thinking <span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    log.appendChild(msg);
    scrollToBottom();
  }

  function removeThinking() {
    const el = document.getElementById('thinkingMsg');
    if (el) el.remove();
  }

  function addBotMessage(answer, dataSource, symbols) {
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    const tagClass = dataSource === 'alpha_vantage_live' ? 'live' : 'mock';
    const tagText = dataSource === 'alpha_vantage_live' ? 'live data' : 'demo data';
    const symbolNote = symbols && symbols.length ? symbols.join(', ') : '—';

    msg.innerHTML = `
      <div class="bubble"></div>
      <div class="meta-row">
        <span class="tag ${tagClass}">${tagText}</span>
        <span>${symbolNote}</span>
      </div>
    `;
    msg.querySelector('.bubble').textContent = answer;
    log.appendChild(msg);
    scrollToBottom();
  }

  async function sendQuestion(question) {
    addUserMessage(question);
    addThinking();
    sendBtn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();
      removeThinking();
      addBotMessage(data.answer, data.data_source, data.symbols);
    } catch (err) {
      removeThinking();
      addBotMessage(
        `Couldn't reach the Quantify backend at ${API_BASE}. Make sure the FastAPI server is running (see README).`,
        'mock_data',
        []
      );
    } finally {
      sendBtn.disabled = false;
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;
    input.value = '';
    sendQuestion(question);
  });

  document.querySelectorAll('.example-btn').forEach(btn => {
    btn.addEventListener('click', () => sendQuestion(btn.dataset.q));
  });
</script>
</body>
</html>
